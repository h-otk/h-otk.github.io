<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Page — h-otk.github.io</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <meta name="google-site-verification" content="19a071926041e2ca" />
</head>
<body>

  <header>
    <a class="logo" href="/">h-otk</a>
    <nav>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Works</a>
    </nav>
  </header>

  <main>

    <section class="hero">
      <p class="label">Test Page</p>
      <h1 id="typing-target">Hello, World!</h1>
      <p class="sub">HTML・CSS・JavaScript を使って構築したテストページです。</p>
    </section>

    <section class="clock-section">
      <p class="label">Current Time</p>
      <div id="clock">--:--:--</div>
    </section>

    <section class="info">
      <div class="card">
        <h3>HTML</h3>
        <p>セマンティックなマークアップで、意味のある構造を表現しています。</p>
      </div>
      <div class="card">
        <h3>CSS</h3>
        <p>カスタムプロパティ・Flexbox・Gridを活用し、レスポンシブに対応しています。</p>
      </div>
      <div class="card">
        <h3>JavaScript</h3>
        <p>タイピングアニメーション、時計、スクロールフェードインを実装しています。</p>
      </div>
    </section>

  </main>

  <footer>
    <p>&copy; 2026 h-otk. All rights reserved.</p>
  </footer>

  <script>
    // 時計
    function tick() {
      const n = new Date();
      const p = v => String(v).padStart(2, '0');
      document.getElementById('clock').textContent =
        `${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
    }
    tick();
    setInterval(tick, 1000);

    // スクロールフェードイン
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
      });
    }, { threshold: 0.15 });
    document.querySelectorAll('.card').forEach(c => obs.observe(c));
  </script>

</body>
</html>
