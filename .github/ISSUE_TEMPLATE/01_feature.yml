name: 新機能
description: 新しい機能やページの追加
title: "[機能] "
labels: ["新機能"]
body:
  - type: textarea
    id: description
    attributes:
      label: やりたいこと
      description: どんな機能・ページを追加したいか
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: 詳細・参考
      description: 参考サイト、デザインイメージ、メモなど
  - type: textarea
    id: done
    attributes:
      label: 完了の条件
      description: どうなれば完成か
    validations:
      required: true
