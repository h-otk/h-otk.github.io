name: バグ報告
description: 不具合・表示崩れの報告
title: "[バグ] "
labels: ["バグ"]
body:
  - type: textarea
    id: what
    attributes:
      label: 何が起きているか
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 本来どうなるべきか
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: どうすれば再現できるか
  - type: input
    id: env
    attributes:
      label: 環境
      description: ブラウザ・デバイスなど（例：Chrome / iPhone）
