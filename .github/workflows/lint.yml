name: HTML / CSS Lint

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 依存パッケージをインストール
        run: npm install --save-dev htmlhint stylelint stylelint-config-standard

      - name: HTMLHint
        run: npx htmlhint --config .htmlhintrc index.html works.html

      - name: Stylelint
        run: npx stylelint style.css --config .stylelintrc.json
