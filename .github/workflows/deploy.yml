name: キャッシュバスター & デプロイ

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: キャッシュバスター（CSS クエリ文字列を SHA に更新）
        run: |
          SHA=$(git rev-parse --short HEAD)
          sed -i "s|style\.css?v=[^\"']*|style.css?v=${SHA}|g" *.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
